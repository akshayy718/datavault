# This file tells Render exactly how to run your backend.
# Render reads this file automatically when you connect your GitHub repo.
services:
  - type: web
    name: datavault-api
    runtime: python
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: datavault-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ENV
        value: production

databases:
  - name: datavault-db
    databaseName: datavault
    user: datavault
